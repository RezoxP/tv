name: Build Optimized APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate a temporary keystore for release build
      run: |
        keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Temporary, OU=Dev, O=Dev, L=City, S=State, C=US"

    - name: Build Optimized APK with Gradle
      env:
        KEYSTORE_PATH: my-upload-key.jks
        STORE_PASSWORD: password
        KEY_PASSWORD: password
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: optimized-apk
        path: app/build/outputs/apk/release/*.apk
